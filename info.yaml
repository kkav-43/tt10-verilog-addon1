project:
  title:        "Rectangular to Cylindrical Converter"  
  author:       "KARTHIK"
  discord:      ""  
  description:  "Converts Cartesian coordinates (x, y) to cylindrical (r, theta)"  
  language:     "Verilog"
  clock_hz:     100000000  # Clock frequency in Hz (100MHz)

  tiles: "1x1"  # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2, or 8x2

  top_module:  "tt_um_rect_cyl"

  source_files:
    - "project.v"

pinout:
  # Inputs (Cartesian X values)
  ui[0]: "x[0]"
  ui[1]: "x[1]"
  ui[2]: "x[2]"
  ui[3]: "x[3]"
  ui[4]: "x[4]"
  ui[5]: "x[5]"
  ui[6]: "x[6]"
  ui[7]: "x[7]"

  # Outputs (Cylindrical R values)
  uo[0]: "r[0]"
  uo[1]: "r[1]"
  uo[2]: "r[2]"
  uo[3]: "r[3]"
  uo[4]: "r[4]"
  uo[5]: "r[5]"
  uo[6]: "r[6]"
  uo[7]: "r[7]"

  # Bidirectional Pins (Y values, Theta output, and Control Signals)
  uio[0]: "y[0]"
  uio[1]: "y[1]"
  uio[2]: "y[2]"
  uio[3]: "y[3]"
  uio[4]: "y[4]"
  uio[5]: "y[5]"
  uio[6]: "y[6]"
  uio[7]: "y[7]"
  uio[8]: "theta[0]"  # Angle output
  uio[9]: "theta[1]"
  uio[10]: "theta[2]"
  uio[11]: "theta[3]"
  uio[12]: "theta[4]"
  uio[13]: "theta[5]"
  uio[14]: "theta[6]"
  uio[15]: "theta[7]"
  uio[16]: "clk"      # Clock signal
  uio[17]: "rst_n"    # Active-low reset
  uio[18]: "ena"      # Enable signal

yaml_version: 6
